<svg width="290" height="463" viewBox="0 0 290 463" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Android green gradient (main identity) -->
    <linearGradient id="androidGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3DDC84"/>
      <stop offset="50%" stop-color="#00FF77"/>
      <stop offset="100%" stop-color="#3DDC84"/>
    </linearGradient>
    <!-- Circuit / signal strand gradient -->
    <linearGradient id="circuitStrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F9D58"/>
      <stop offset="30%" stop-color="#3DDC84"/>
      <stop offset="60%" stop-color="#A4F3C6"/>
      <stop offset="100%" stop-color="#0F9D58"/>
    </linearGradient>
    <!-- Glow haze behind bodies -->
    <radialGradient id="glowHaze" cx="50%" cy="50%">
      <stop offset="0%"   stop-color="#3DDC84" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#0F9D58" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0F9D58" stop-opacity="0"/>
    </radialGradient>
    <!-- Signal waves -->
    <radialGradient id="signalWave" cx="50%" cy="50%">
      <stop offset="0%"  stop-color="#3DDC84" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#3DDC84" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3DDC84" stop-opacity="0"/>
    </radialGradient>
    <!-- Eye / LED glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="40%" stop-color="#A4F3C6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3DDC84" stop-opacity="0"/>
    </radialGradient>
    <!-- Phone screen -->
    <linearGradient id="phoneScreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#0B1F14"/>
      <stop offset="100%" stop-color="#092114"/>
    </linearGradient>
    <!-- Filters -->
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="starglow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ====== GREEN STRAND (intelligence ribbon — the Strands identity) ====== -->
  <path d="M259.147 0.981812C271.389 -2.57498 284.197 4.46571 287.754 16.7074C291.311 28.9492 284.27 41.757 272.028 45.3138L71.1727 103.671C40.7142 112.521 37.1976 154.262 65.7459 168.083L241.343 253.093C307.872 285.302 299.794 382.546 228.862 403.336L30.4041 461.502C18.1707 465.088 5.34708 458.078 1.76153 445.844C-1.8239 433.611 5.18637 420.787 17.4197 417.202L215.878 359.035C246.277 350.125 249.739 308.449 221.226 294.645L45.6297 209.635C-20.9834 177.386 -12.7772 79.9893 58.2928 59.3402L259.147 0.981812Z" fill="#00FF77"/>

  <!-- ====== ADB CIRCUIT STRAND (replaces second strand — circuit lines + nodes) ====== -->

  <!-- Glow halos along the ADB strand -->
  <ellipse cx="105" cy="80"  rx="35" ry="25" fill="url(#glowHaze)" filter="url(#bigglow)"/>
  <ellipse cx="200" cy="155" rx="30" ry="22" fill="url(#glowHaze)" filter="url(#bigglow)"/>
  <ellipse cx="75"  cy="240" rx="32" ry="20" fill="url(#glowHaze)" filter="url(#bigglow)"/>
  <ellipse cx="15"  cy="345" rx="28" ry="22" fill="url(#glowHaze)" filter="url(#bigglow)"/>
  <ellipse cx="140" cy="400" rx="30" ry="20" fill="url(#glowHaze)" filter="url(#bigglow)"/>

  <!-- Main ADB strand body (circuit / signal ribbon) -->
  <path d="M97.3 52.8 C102 75, 105 90, 108 103.8 C130 112, 170 122, 201.5 130.2 C204 145, 205 160, 205.9 176.3 C175 190, 145 205, 118.4 218.7 C85 232, 55 248, 31 261.1 C22 290, 14 318, 9.8 344.5 C40 358, 65 370, 96.3 383.7 C130 393, 160 402, 189.6 411"
    stroke="url(#circuitStrand)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>

  <!-- Inner highlight -->
  <path d="M97.3 52.8 C102 75, 105 90, 108 103.8 C130 112, 170 122, 201.5 130.2 C204 145, 205 160, 205.9 176.3 C175 190, 145 205, 118.4 218.7 C85 232, 55 248, 31 261.1 C22 290, 14 318, 9.8 344.5 C40 358, 65 370, 96.3 383.7 C130 393, 160 402, 189.6 411"
    stroke="#A4F3C6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.35"/>

  <!-- ====== CENTRAL FEATURE: ANDROID ROBOT + PHONE (the "ADB" handshake) ====== -->
  <!-- Positioned at the main crossing point -->
  <g transform="translate(118.4, 218.7)">
    <!-- Outer halo -->
    <circle r="34" fill="url(#glowHaze)" filter="url(#softglow)"/>

    <!-- Phone (flat, behind the robot, showing the app is ON the phone) -->
    <g transform="translate(-20, -2) rotate(-15)">
      <rect x="-10" y="-18" width="20" height="34" rx="3" ry="3" fill="#0A0A0A" stroke="#3DDC84" stroke-width="1.2"/>
      <rect x="-8"  y="-15" width="16" height="26" rx="1.5" ry="1.5" fill="url(#phoneScreen)"/>
      <!-- screen content: mini android head on screen -->
      <circle cx="0" cy="-6"   r="3.2" fill="#3DDC84"/>
      <rect   x="-3" y="-3.5" width="6" height="5" rx="0.5" fill="#3DDC84"/>
      <!-- screen scan glow -->
      <rect x="-8" y="-2" width="16" height="1.2" fill="#A4F3C6" opacity="0.5"/>
      <!-- home indicator -->
      <rect x="-3" y="13" width="6" height="1" rx="0.5" fill="#3DDC84" opacity="0.5"/>
    </g>

    <!-- Android robot body -->
    <!-- Head dome (semicircle) -->
    <path d="M -13 -2 A 13 13 0 0 1 13 -2 L 13 0 L -13 0 Z" fill="url(#androidGreen)" stroke="#0F9D58" stroke-width="0.8"/>
    <!-- Eyes -->
    <circle cx="-5" cy="-8" r="1.5" fill="#FFFFFF"/>
    <circle cx="5"  cy="-8" r="1.5" fill="#FFFFFF"/>
    <circle cx="-5" cy="-8" r="2.8" fill="url(#eyeGlow)" opacity="0.6"/>
    <circle cx="5"  cy="-8" r="2.8" fill="url(#eyeGlow)" opacity="0.6"/>
    <!-- Antennae -->
    <line x1="-7" y1="-14" x2="-10" y2="-20" stroke="#0F9D58" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="7"  y1="-14" x2="10"  y2="-20" stroke="#0F9D58" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="-10" cy="-20" r="0.9" fill="#A4F3C6"/>
    <circle cx="10"  cy="-20" r="0.9" fill="#A4F3C6"/>

    <!-- Body (rounded rect) -->
    <rect x="-12" y="2" width="24" height="18" rx="2" ry="2" fill="url(#androidGreen)" stroke="#0F9D58" stroke-width="0.8"/>
    <!-- Body highlight -->
    <rect x="-10" y="3.5" width="4" height="14" rx="1" fill="#A4F3C6" opacity="0.35"/>
    <!-- Arms -->
    <rect x="-17" y="3" width="4" height="14" rx="2" fill="url(#androidGreen)" stroke="#0F9D58" stroke-width="0.6"/>
    <rect x="13"  y="3" width="4" height="14" rx="2" fill="url(#androidGreen)" stroke="#0F9D58" stroke-width="0.6"/>
    <!-- Legs -->
    <rect x="-7" y="20" width="4" height="8" rx="1.5" fill="url(#androidGreen)" stroke="#0F9D58" stroke-width="0.6"/>
    <rect x="3"  y="20" width="4" height="8" rx="1.5" fill="url(#androidGreen)" stroke="#0F9D58" stroke-width="0.6"/>

    <!-- USB connector line (ADB = Android Debug Bridge) from robot → orbit -->
    <path d="M 12 10 C 22 10, 26 3, 28 -4" stroke="#A4F3C6" stroke-width="1.2" fill="none" opacity="0.7" stroke-dasharray="2 1.5"/>
    <circle cx="28" cy="-4" r="1.5" fill="#A4F3C6"/>

    <!-- Orbit ring around the duo -->
    <ellipse rx="32" ry="10" fill="none" stroke="#3DDC84" stroke-width="1" opacity="0.35" transform="rotate(-18)"/>
  </g>

  <!-- ====== PHONE NODE #1 — top, where hand reaches (intent/launch) ====== -->
  <g transform="translate(108, 103.8)">
    <circle r="9" fill="url(#glowHaze)" filter="url(#softglow)"/>
    <!-- small phone -->
    <rect x="-5" y="-8" width="10" height="16" rx="1.5" ry="1.5" fill="#0A0A0A" stroke="#3DDC84" stroke-width="1"/>
    <rect x="-4" y="-6.5" width="8" height="11" rx="0.5" fill="url(#phoneScreen)"/>
    <!-- dot on screen -->
    <circle cx="0" cy="-1" r="1.3" fill="#3DDC84"/>
    <rect x="-1.5" y="5.5" width="3" height="0.7" rx="0.3" fill="#3DDC84" opacity="0.6"/>
  </g>

  <!-- ====== SIGNAL NODE #2 — elbow (broadcasting) ====== -->
  <g transform="translate(201.5, 130.2)">
    <circle r="10" fill="url(#signalWave)" filter="url(#softglow)"/>
    <!-- antenna tower -->
    <line x1="0" y1="6" x2="0" y2="-7" stroke="#3DDC84" stroke-width="1.5" stroke-linecap="round"/>
    <!-- signal arcs -->
    <path d="M -4 -3 A 5 5 0 0 1 4 -3" stroke="#3DDC84" stroke-width="1" fill="none"/>
    <path d="M -6 -1 A 7 7 0 0 1 6 -1" stroke="#A4F3C6" stroke-width="0.8" fill="none" opacity="0.7"/>
    <path d="M -8  1 A 9 9 0 0 1 8  1" stroke="#A4F3C6" stroke-width="0.6" fill="none" opacity="0.4"/>
    <circle cx="0" cy="-7" r="1.4" fill="#A4F3C6"/>
  </g>

  <!-- ====== TAP NODE #3 — small finger/tap indicator ====== -->
  <g transform="translate(205.9, 176.3)">
    <circle r="6" fill="#0A0A0A" stroke="#3DDC84" stroke-width="1.2"/>
    <!-- tap ripple -->
    <circle r="3" fill="#3DDC84"/>
    <circle r="8" fill="none" stroke="#A4F3C6" stroke-width="0.8" opacity="0.5"/>
    <circle r="11" fill="none" stroke="#A4F3C6" stroke-width="0.5" opacity="0.25"/>
  </g>

  <!-- ====== SETTINGS / GEAR NODE #4 (lower left) ====== -->
  <g transform="translate(31, 261.1)">
    <circle r="9" fill="url(#glowHaze)" filter="url(#softglow)"/>
    <!-- Gear -->
    <g fill="#3DDC84" stroke="#0F9D58" stroke-width="0.4">
      <circle r="4.5"/>
      <circle r="2" fill="#0A1F14"/>
      <rect x="-1" y="-7.5" width="2" height="3" rx="0.3"/>
      <rect x="-1" y="4.5"  width="2" height="3" rx="0.3"/>
      <rect x="-7.5" y="-1" width="3" height="2" rx="0.3"/>
      <rect x="4.5"  y="-1" width="3" height="2" rx="0.3"/>
      <rect x="-1" y="-7.5" width="2" height="3" rx="0.3" transform="rotate(45)"/>
      <rect x="-1" y="-7.5" width="2" height="3" rx="0.3" transform="rotate(-45)"/>
      <rect x="-1" y="4.5"  width="2" height="3" rx="0.3" transform="rotate(45)"/>
      <rect x="-1" y="4.5"  width="2" height="3" rx="0.3" transform="rotate(-45)"/>
    </g>
  </g>

  <!-- ====== CAMERA NODE #5 (small red-green, lower crossing) ====== -->
  <g transform="translate(9.8, 344.5)">
    <circle r="7" fill="#0A0A0A" stroke="#3DDC84" stroke-width="1"/>
    <circle r="4" fill="#0F9D58"/>
    <circle r="2.2" fill="#A4F3C6"/>
    <circle r="0.8" fill="#FFFFFF"/>
    <!-- red record dot -->
    <circle cx="5" cy="-5" r="1.3" fill="#F44336"/>
  </g>

  <!-- ====== ENDPOINT: USB / CONNECTOR (gripper position — physical bridge) ====== -->
  <g transform="translate(189.6, 411)">
    <circle r="15" fill="url(#glowHaze)" filter="url(#bigglow)"/>
    <!-- USB-A connector -->
    <rect x="-8" y="-4" width="16" height="8" rx="1" fill="#0A0A0A" stroke="#3DDC84" stroke-width="1.2"/>
    <rect x="-6" y="-2" width="12" height="4" rx="0.5" fill="#3DDC84" opacity="0.6"/>
    <!-- pin -->
    <rect x="8" y="-1" width="3" height="2" fill="#A4F3C6"/>
    <!-- cable trailing off -->
    <path d="M -8 0 C -14 0, -17 2, -19 4" stroke="#0F9D58" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ====== START POINT (signal pulse at shoulder) ====== -->
  <g transform="translate(97.3, 52.8)">
    <circle r="10" fill="url(#signalWave)" filter="url(#bigglow)"/>
    <circle r="4" fill="#A4F3C6" filter="url(#starglow)"/>
    <circle r="1.5" fill="white"/>
  </g>

  <!-- ====== WIFI NODE at wrist ====== -->
  <g transform="translate(96.3, 383.7)">
    <circle r="7" fill="url(#signalWave)" filter="url(#softglow)"/>
    <!-- wifi arcs -->
    <path d="M -5 2 A 6 6 0 0 1 5 2" stroke="#3DDC84" stroke-width="1.2" fill="none"/>
    <path d="M -3 3 A 4 4 0 0 1 3 3" stroke="#A4F3C6" stroke-width="1" fill="none" opacity="0.8"/>
    <circle cx="0" cy="4" r="1.2" fill="#A4F3C6"/>
  </g>

  <!-- ====== SCATTERED BITS / PACKETS along strand ====== -->
  <g fill="#A4F3C6">
    <rect x="85"  y="67"  width="2" height="2" opacity="0.85"/>
    <rect x="115" y="88"  width="1.5" height="1.5" opacity="0.65"/>
    <rect x="155" y="117" width="2" height="2" opacity="0.75" filter="url(#starglow)"/>
    <rect x="185" y="125" width="1.3" height="1.3" opacity="0.5"/>
    <rect x="215" y="150" width="2" height="2" opacity="0.7" filter="url(#starglow)"/>
    <rect x="195" y="195" width="1.5" height="1.5" opacity="0.6"/>
    <rect x="160" y="208" width="2" height="2" opacity="0.8" filter="url(#starglow)"/>
    <rect x="85"  y="234" width="1.5" height="1.5" opacity="0.6"/>
    <rect x="50"  y="251" width="2" height="2" opacity="0.75" filter="url(#starglow)"/>
    <rect x="22"  y="290" width="1.3" height="1.3" opacity="0.55"/>
    <rect x="15"  y="320" width="2" height="2" opacity="0.75" filter="url(#starglow)"/>
    <rect x="28"  y="365" width="1.5" height="1.5" opacity="0.6"/>
    <rect x="55"  y="375" width="2" height="2" opacity="0.85" filter="url(#starglow)"/>
    <rect x="130" y="395" width="1.3" height="1.3" opacity="0.55"/>
    <rect x="165" y="405" width="2" height="2" opacity="0.75" filter="url(#starglow)"/>
    <rect x="200" y="425" width="1.5" height="1.5" opacity="0.6"/>
  </g>

  <!-- Accent bits (command/data packet colors) -->
  <rect x="140" y="147" width="2.5" height="2.5" fill="#3DDC84" opacity="0.8" filter="url(#starglow)"/>
  <rect x="70"  y="259" width="2.2" height="2.2" fill="#3DDC84" opacity="0.7" filter="url(#starglow)"/>
  <rect x="45"  y="329" width="2.3" height="2.3" fill="#00FF77" opacity="0.7" filter="url(#starglow)"/>
  <rect x="110" y="394" width="2.2" height="2.2" fill="#A4F3C6" opacity="0.7" filter="url(#starglow)"/>

  <!-- Crossing sparks (green strand meets ADB circuit) -->
  <circle cx="108"   cy="103.8" r="6" fill="#00FF77" opacity="0.12" filter="url(#softglow)"/>
  <circle cx="118.4" cy="218.7" r="9" fill="#00FF77" opacity="0.13" filter="url(#softglow)"/>
  <circle cx="9.8"   cy="344.5" r="6" fill="#00FF77" opacity="0.12" filter="url(#softglow)"/>
</svg>
